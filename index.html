<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fuel Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .home-btn, .refresh-btn, .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .home-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .refresh-btn {
            background: white;
            color: #667eea;
        }

        .refresh-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .export-btn {
            background: #28a745;
            color: white;
        }

        .export-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .content {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-value small {
            font-size: 0.5em;
            color: #999;
        }

        .filters-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            min-width: 200px;
            background: white;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: auto;
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1800px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 12px;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 0.9em;
        }

        tr:hover {
            background-color: #f8f9ff;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .drive-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85em;
            word-break: break-all;
            display: inline-block;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drive-link:hover {
            text-decoration: underline;
            white-space: normal;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #fcc;
        }

        .error button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
        }

        .error button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .clear-filters {
            color: #667eea;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: underline;
        }

        .clear-filters:hover {
            color: #764ba2;
        }

        .proxy-note {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>🚗⛽</span>
                Vehicle Fuel Management Dashboard
            </h1>
            <div class="nav-buttons">
                <a href="#" onclick="window.location.reload()" class="home-btn">
                    <span>🏠</span> Home
                </a>
                <button class="export-btn" onclick="exportToCSV()" id="exportBtn" disabled>
                    <span>📥</span> Export CSV
                </button>
                <button class="refresh-btn" onclick="loadData()">
                    <span>🔄</span> Refresh
                </button>
            </div>
        </div>

        <div class="content">
            <!-- Statistics Cards -->
            <div id="statsContainer" class="stats-grid"></div>

            <!-- CORS Proxy Notice -->
            <div id="proxyNote" class="proxy-note" style="display: none;">
                ⚡ Using CORS proxy to fetch data. This is a temporary solution.
            </div>

            <!-- Filters Section -->
            <div class="filters-section" id="filtersSection" style="display: none;">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search..." onkeyup="filterData()">
                </div>
                <select id="vehicleFilter" class="filter-select" onchange="filterData()">
                    <option value="">All Vehicles</option>
                </select>
                <select id="driverFilter" class="filter-select" onchange="filterData()">
                    <option value="">All Drivers</option>
                </select>
                <span class="clear-filters" onclick="clearFilters()">Clear Filters</span>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Connecting to Google Sheets...</p>
                <p style="font-size: 0.9em; color: #666; margin-top: 10px;">This may take a few seconds</p>
            </div>

            <!-- Error Message -->
            <div id="error" class="error" style="display: none;"></div>

            <!-- Data Table -->
            <div id="tableContainer" class="table-container" style="display: none;">
                <table id="dataTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>Last updated: <span id="lastUpdated">Never</span></p>
            <p>Total Records: <span id="totalRecords">0</span> | Showing: <span id="showingRecords">0</span></p>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5_H_pe9EW7mheqxR_RrNKMKnOc1y8GRhJ_DYrSE8ReNZGC1bs4IyIwugJJgh_FjYn/exec';
        
        // CORS proxy URLs to try (in order)
        const CORS_PROXIES = [
            '', // Try direct connection first
            'https://cors-anywhere.herokuapp.com/',
            'https://api.allorigins.win/raw?url=',
            'https://thingproxy.freeboard.io/fetch/'
        ];
        
        let currentProxyIndex = 0;
        let originalData = [];
        let filteredData = [];
        let uniqueVehicles = new Set();
        let uniqueDrivers = new Set();

        // Load data immediately
        window.onload = function() {
            loadData();
        };

        async function loadData() {
            showLoading();
            
            // Try each proxy until one works
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                currentProxyIndex = i;
                const proxyUrl = CORS_PROXIES[i];
                
                try {
                    let url;
                    if (proxyUrl) {
                        // Show proxy notice
                        document.getElementById('proxyNote').style.display = 'block';
                        // Encode the Apps Script URL for the proxy
                        url = proxyUrl + encodeURIComponent(APPS_SCRIPT_URL + '?t=' + new Date().getTime());
                    } else {
                        // Direct connection
                        document.getElementById('proxyNote').style.display = 'none';
                        url = APPS_SCRIPT_URL + '?t=' + new Date().getTime();
                    }
                    
                    console.log(`Trying proxy ${i}: ${proxyUrl || 'direct'}`);
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        mode: 'cors',
                        cache: 'no-cache',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const text = await response.text();
                    console.log('Response received, length:', text.length);
                    
                    // Try to parse the response
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        // If not JSON, try to extract JSON from the response
                        const jsonMatch = text.match(/\{.*\}/s);
                        if (jsonMatch) {
                            data = JSON.parse(jsonMatch[0]);
                        } else {
                            throw new Error('Invalid response format');
                        }
                    }
                    
                    if (!data.success) {
                        throw new Error(data.error || 'Unknown error');
                    }
                    
                    // Success! Process the data
                    processData(data);
                    return;
                    
                } catch (error) {
                    console.log(`Proxy ${i} failed:`, error.message);
                    // Continue to next proxy
                }
            }
            
            // If all proxies failed
            showError(
                'Unable to connect to Google Sheets. This is usually due to CORS restrictions.<br><br>' +
                'To fix this permanently, you need to host this HTML file in one of these ways:<br>' +
                '1. Use Google Apps Script to serve the HTML (recommended)<br>' +
                '2. Use a simple HTTP server like "python -m http.server"<br>' +
                '3. Use GitHub Pages or Netlify to host the file<br><br>' +
                'Or try opening this HTML file using the "Live Server" extension in VS Code.'
            );
        }

        function processData(result) {
            originalData = result.data;
            filteredData = [...originalData];
            
            // Extract unique values for filters
            originalData.forEach(row => {
                if (row['Vehicle Registration']) uniqueVehicles.add(row['Vehicle Registration']);
                if (row['Driver Name']) uniqueDrivers.add(row['Driver Name']);
            });
            
            // Populate filters
            populateFilters();
            
            // Calculate and display statistics
            calculateStats(originalData);
            
            // Display headers and data
            displayHeaders(result.headers);
            displayRows(originalData);
            
            // Update UI
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            document.getElementById('totalRecords').textContent = originalData.length;
            document.getElementById('showingRecords').textContent = originalData.length;
            document.getElementById('filtersSection').style.display = 'flex';
            document.getElementById('tableContainer').style.display = 'block';
            document.getElementById('exportBtn').disabled = false;
            
            hideLoading();
        }

        function calculateStats(data) {
            let totalKm = 0, totalFuel = 0, totalCost = 0, totalLubeCost = 0;
            let vehicles = new Set();
            let drivers = new Set();
            
            data.forEach(row => {
                totalKm += parseFloat(row['Km Traveled']) || 0;
                totalFuel += parseFloat(row['Fuel Liters']) || 0;
                totalCost += parseFloat(row['Total Cost']) || 0;
                totalLubeCost += parseFloat(row['Lubrication Cost']) || 0;
                if (row['Vehicle Registration']) vehicles.add(row['Vehicle Registration']);
                if (row['Driver Name']) drivers.add(row['Driver Name']);
            });
            
            const avgKmPerLiter = totalFuel > 0 ? (totalKm / totalFuel).toFixed(2) : 0;
            const avgCostPerKm = totalKm > 0 ? (totalCost / totalKm).toFixed(2) : 0;
            
            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-title">Total Entries</div>
                    <div class="stat-value">${data.length}</div>
                    <div class="stat-detail">${vehicles.size} Vehicles | ${drivers.size} Drivers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Distance</div>
                    <div class="stat-value">${Number(totalKm).toLocaleString()} <small>km</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Fuel</div>
                    <div class="stat-value">${Number(totalFuel).toLocaleString()} <small>L</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Cost</div>
                    <div class="stat-value">$${Number(totalCost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Avg Efficiency</div>
                    <div class="stat-value">${avgKmPerLiter} <small>km/L</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Avg Cost/km</div>
                    <div class="stat-value">$${avgCostPerKm}</div>
                </div>
            `;
            
            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        function populateFilters() {
            const vehicleFilter = document.getElementById('vehicleFilter');
            const driverFilter = document.getElementById('driverFilter');
            
            vehicleFilter.innerHTML = '<option value="">All Vehicles</option>';
            driverFilter.innerHTML = '<option value="">All Drivers</option>';
            
            [...uniqueVehicles].sort().forEach(vehicle => {
                vehicleFilter.innerHTML += `<option value="${vehicle}">${vehicle}</option>`;
            });
            
            [...uniqueDrivers].sort().forEach(driver => {
                driverFilter.innerHTML += `<option value="${driver}">${driver}</option>`;
            });
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const vehicle = document.getElementById('vehicleFilter').value;
            const driver = document.getElementById('driverFilter').value;
            
            filteredData = originalData.filter(row => {
                // Search filter
                if (searchTerm) {
                    const searchable = Object.values(row).join(' ').toLowerCase();
                    if (!searchable.includes(searchTerm)) return false;
                }
                
                // Vehicle filter
                if (vehicle && row['Vehicle Registration'] !== vehicle) return false;
                
                // Driver filter
                if (driver && row['Driver Name'] !== driver) return false;
                
                return true;
            });
            
            displayRows(filteredData);
            document.getElementById('showingRecords').textContent = filteredData.length;
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('vehicleFilter').value = '';
            document.getElementById('driverFilter').value = '';
            filterData();
        }

        function displayHeaders(headers) {
            const thead = document.getElementById('tableHeader');
            let html = '<tr>';
            
            headers.forEach(header => {
                if (header !== 'PDF Report Link') {
                    const displayName = header
                        .replace(/([A-Z])/g, ' $1')
                        .replace(/_/g, ' ')
                        .trim();
                    html += `<th>${displayName}</th>`;
                }
            });
            
            html += '</tr>';
            thead.innerHTML = html;
        }

        function displayRows(data) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            if (data.length === 0) {
                html = '<tr><td colspan="100%" style="text-align: center; padding: 50px;">No records found</td></tr>';
            } else {
                data.forEach(row => {
                    html += '<tr>';
                    
                    for (let key in row) {
                        if (key === 'PDF Report Link') continue;
                        
                        let value = row[key] || '';
                        
                        // Format based on column type
                        if (key === 'Date' || key === 'Timestamp') {
                            try {
                                const date = new Date(value);
                                if (!isNaN(date.getTime())) {
                                    value = date.toLocaleString();
                                }
                            } catch (e) {}
                        }
                        
                        if (key.includes('Cost') || key.includes('Amount') || key.includes('Price')) {
                            if (value && !isNaN(value)) {
                                value = `$${Number(value).toFixed(2)}`;
                            }
                        }
                        
                        if (key === 'Drive Folder Link' && value) {
                            value = `<a href="${value}" target="_blank" class="drive-link">📁 View Folder</a>`;
                        }
                        
                        html += `<td>${value}</td>`;
                    }
                    
                    html += '</tr>';
                });
            }

            tbody.innerHTML = html;
        }

        function exportToCSV() {
            if (filteredData.length === 0) return;
            
            const headers = Object.keys(filteredData[0]).filter(h => h !== 'PDF Report Link');
            let csv = headers.join(',') + '\n';
            
            filteredData.forEach(row => {
                const rowData = headers.map(header => {
                    let value = row[header] || '';
                    value = value.toString().replace(/<[^>]*>/g, '');
                    if (value.includes(',') || value.includes('"')) {
                        value = '"' + value.replace(/"/g, '""') + '"';
                    }
                    return value;
                });
                csv += rowData.join(',') + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fuel_data_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('filtersSection').style.display = 'none';
            document.getElementById('exportBtn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `
                <strong>⚠️ Connection Error</strong><br><br>
                ${message}<br><br>
                <button onclick="loadData()">Try Again</button>
            `;
        }
    </script>
</body>
</html>
