<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fuel Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .home-btn {
            background-color: white;
            color: #4CAF50;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }
        .home-btn:hover {
            background-color: #f0f0f0;
        }
        .refresh-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .refresh-btn:hover {
            background-color: #1976D2;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 14px;
        }
        .card .value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #ef9a9a;
        }
        .table-container {
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            color: #666;
        }
        .debug-info {
            background-color: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 Vehicle Fuel Dashboard</h1>
        <div class="nav-buttons">
            <a href="https://script.google.com/macros/s/AKfycby5_H_pe9EW7mheqxR_RrNKMKnOc1y8GRhJ_DYrSE8ReNZGC1bs4IyIwugJJgh_FjYn/exec" class="home-btn">🏠 Home</a>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>
    </div>

    <div id="summary" class="summary-cards"></div>

    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        Loading data from Google Sheets...
    </div>

    <div id="error" class="error" style="display: none;"></div>
    
    <div id="debug" class="debug-info"></div>

    <div id="tableContainer" class="table-container" style="display: none;">
        <table id="dataTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <p>Last updated: <span id="lastUpdated">Never</span></p>
        <p style="font-size: 12px;">Data source: Google Sheets ID: 1SnhLTWgzJfkKNmIvtj8uwa-8x7TsnRtqkfX3deEuHIQ</p>
    </div>

    <script>
        // Your Google Apps Script Web App URL
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5_H_pe9EW7mheqxR_RrNKMKnOc1y8GRhJ_DYrSE8ReNZGC1bs4IyIwugJJgh_FjYn/exec';
        
        // Store data for filtering
        let originalData = [];
        let originalHeaders = [];

        // Load data when page loads
        window.onload = function() {
            loadData();
        };

        async function loadData() {
            // Show loading, hide table and error
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('debug').style.display = 'none';
            
            try {
                // Add cache busting parameter
                const url = APPS_SCRIPT_URL + '?t=' + new Date().getTime();
                
                console.log('Fetching from:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                console.log('Raw response:', text.substring(0, 200) + '...'); // Log first 200 chars
                
                // Try to parse the response
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    // If not JSON, try to extract JSON from HTML
                    const jsonMatch = text.match(/\{.*\}/s);
                    if (jsonMatch) {
                        data = JSON.parse(jsonMatch[0]);
                    } else {
                        throw new Error('Response is not valid JSON');
                    }
                }
                
                displayData(data);
                
            } catch (error) {
                console.error('Fetch error:', error);
                displayError(error.message);
            }
        }

        function displayData(result) {
            document.getElementById('loading').style.display = 'none';
            
            if (!result.success) {
                displayError(result.error || 'Unknown error occurred');
                return;
            }

            // Store original data
            originalData = result.data;
            originalHeaders = result.headers;

            // Update last updated time
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();

            // Display summary cards
            displaySummary(result.summary);

            // Display table headers
            displayHeaders(result.headers);

            // Display table data
            displayRows(result.data);

            // Show table
            document.getElementById('tableContainer').style.display = 'block';
        }

        function displaySummary(summary) {
            const summaryDiv = document.getElementById('summary');
            summaryDiv.innerHTML = `
                <div class="card">
                    <h3>Total Entries</h3>
                    <div class="value">${summary.totalEntries}</div>
                </div>
                <div class="card">
                    <h3>Total KM</h3>
                    <div class="value">${Number(summary.totalKm).toLocaleString()} km</div>
                </div>
                <div class="card">
                    <h3>Total Fuel</h3>
                    <div class="value">${Number(summary.totalFuel).toLocaleString()} L</div>
                </div>
                <div class="card">
                    <h3>Total Cost</h3>
                    <div class="value">$${Number(summary.totalCost).toLocaleString()}</div>
                </div>
                <div class="card">
                    <h3>Lubrication Cost</h3>
                    <div class="value">$${Number(summary.totalLubricationCost).toLocaleString()}</div>
                </div>
                <div class="card">
                    <h3>Avg KM/L</h3>
                    <div class="value">${summary.avgKmPerLiter}</div>
                </div>
                <div class="card">
                    <h3>Avg Cost/KM</h3>
                    <div class="value">$${summary.avgCostPerKm}</div>
                </div>
            `;
        }

        function displayHeaders(headers) {
            // Filter out PDF and Drive links if they exist
            const displayHeaders = headers.filter(h => 
                h !== 'PDF Report Link' && h !== 'Drive Folder Link'
            );
            
            let html = '<tr>';
            displayHeaders.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr>';
            
            document.getElementById('tableHeader').innerHTML = html;
        }

        function displayRows(data) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            if (data.length === 0) {
                html = '<tr><td colspan="100%" style="text-align: center; padding: 50px;">No data available</td></tr>';
            } else {
                data.forEach(row => {
                    html += '<tr>';
                    
                    // Display all data except PDF and Drive links
                    for (let key in row) {
                        if (key !== 'PDF Report Link' && key !== 'Drive Folder Link') {
                            let value = row[key] || '';
                            
                            // Format date
                            if (key === 'Date' && value) {
                                try {
                                    const date = new Date(value);
                                    if (!isNaN(date.getTime())) {
                                        value = date.toLocaleDateString();
                                    }
                                } catch (e) {}
                            }
                            
                            // Format currency
                            if (key.includes('Cost') || key.includes('Amount') || key.includes('Price') || key.includes('Paid')) {
                                if (value && !isNaN(value)) {
                                    value = `$${Number(value).toFixed(2)}`;
                                }
                            }
                            
                            html += `<td>${value}</td>`;
                        }
                    }
                    
                    html += '</tr>';
                });
            }

            tbody.innerHTML = html;
        }

        function displayError(error) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `
                <strong>⚠️ Error Loading Data</strong><br>
                ${error}<br><br>
                <button onclick="loadData()" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">Try Again</button>
                <button onclick="showDebugInfo()" style="padding: 10px 20px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Show Debug Info</button>
            `;
        }

        function showDebugInfo() {
            const debugDiv = document.getElementById('debug');
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `
                <strong>Debug Information:</strong><br>
                Apps Script URL: ${APPS_SCRIPT_URL}<br>
                Sheet ID: 1SnhLTWgzJfkKNmIvtj8uwa-8x7TsnRtqkfX3deEuHIQ<br>
                Current Time: ${new Date().toLocaleString()}<br>
                Browser: ${navigator.userAgent}<br>
                <br>
                <strong>Troubleshooting Steps:</strong><br>
                1. Make sure the Apps Script is deployed as "Web App"<br>
                2. Check that "Execute as" is set to "Me"<br>
                3. Verify "Who has access" is set to "Anyone"<br>
                4. Try opening the Apps Script URL directly in browser<br>
                5. Check if the Google Sheet is shared with the script
            `;
        }
    </script>
</body>
</html>
