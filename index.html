<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fuel Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 14px;
        }
        .card .value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        .table-container {
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .refresh-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 Vehicle Fuel Dashboard</h1>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
    </div>

    <div id="summary" class="summary-cards"></div>

    <div id="loading" class="loading" style="display: none;">Loading data...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="tableContainer" class="table-container" style="display: none;">
        <table id="dataTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        window.onload = function() {
            loadData();
        };

        function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            google.script.run
                .withSuccessHandler(displayData)
                .withFailureHandler(displayError)
                .getFuelData();
        }

        function displayData(result) {
            document.getElementById('loading').style.display = 'none';
            
            if (!result.success) {
                displayError(result.error);
                return;
            }

            displaySummary(result.summary);
            displayHeaders(result.headers);
            displayRows(result.data);
            
            document.getElementById('tableContainer').style.display = 'block';
        }

        function displaySummary(summary) {
            const html = `
                <div class="card"><h3>Total Entries</h3><div class="value">${summary.totalEntries}</div></div>
                <div class="card"><h3>Total KM</h3><div class="value">${summary.totalKm} km</div></div>
                <div class="card"><h3>Total Fuel</h3><div class="value">${summary.totalFuel} L</div></div>
                <div class="card"><h3>Total Cost</h3><div class="value">$${summary.totalCost}</div></div>
                <div class="card"><h3>Lubrication Cost</h3><div class="value">$${summary.totalLubricationCost}</div></div>
                <div class="card"><h3>Avg KM/L</h3><div class="value">${summary.avgKmPerLiter}</div></div>
                <div class="card"><h3>Avg Cost/KM</h3><div class="value">$${summary.avgCostPerKm}</div></div>
            `;
            document.getElementById('summary').innerHTML = html;
        }

        function displayHeaders(headers) {
            const html = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
            document.getElementById('tableHeader').innerHTML = html;
        }

        function displayRows(data) {
            let html = '';
            data.forEach(row => {
                html += '<tr>';
                for (let key in row) {
                    html += `<td>${row[key] || ''}</td>`;
                }
                html += '</tr>';
            });
            document.getElementById('tableBody').innerHTML = html;
        }

        function displayError(error) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error: ' + error;
        }
    </script>
</body>
</html>
